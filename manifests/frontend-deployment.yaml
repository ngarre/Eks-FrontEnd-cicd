apiVersion: apps/v1
kind: Deployment
metadata:
  name: temperaturas-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: temperaturas-frontend
  template:
    metadata:
      labels:
        app: temperaturas-frontend
    spec:
      containers:
      - name: temperaturas-frontend
        image: ngarre/aa2-frontend
        ports:
        - containerPort: 3001
	env: 
	  - name: TEMP_SERVER
	    value: temperaturas-backend:5000
        resources:
          requests:
            memory: "64Mi"
            cpu: "80m"
          limits:
            memory: "128Mi"
            cpu: "250m